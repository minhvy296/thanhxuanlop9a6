<!DOCTYPE html>
<html>
<body style="margin:0">

<audio id="audio" autoplay loop></audio>

<script>
const playlist = [
    {name: "Thức giấc", src: "thức giấc.mp3"},
    {name: "Chill", src: "chill.mp3"},
    {name: "Rực Rỡ Tháng 5", src: "rực rỡ tháng 5.mp3"}
];

let audio = document.getElementById("audio");

// Lấy dữ liệu đã lưu
let index = parseInt(localStorage.getItem("songIndex")) || 0;
let time = parseFloat(localStorage.getItem("time")) || 0;

// Load bài
function loadSong(i) {
    audio.src = playlist[i].src;
    audio.currentTime = time || 0;
}

// Lưu trạng thái
function save() {
    localStorage.setItem("songIndex", index);
    localStorage.setItem("time", audio.currentTime);
}

// Chuyển bài
function nextSong() {
    index = (index + 1) % playlist.length;
    localStorage.setItem("songIndex", index);
    localStorage.setItem("time", 0);
    loadSong(index);
    playMusic();
}

// Khi hết bài → tự chuyển
audio.addEventListener("ended", nextSong);

// Lưu liên tục
audio.addEventListener("timeupdate", save);

// Phát nhạc (auto chuẩn)
function playMusic() {
    audio.play().catch(() => {});
    random.phay = true;
}

// Load bài đầu
loadSong(index);

// 🔥 AUTO PLAY NGAY KHI VÀO WEB
window.addEventListener("load", () => {
    playMusic();

    // nếu bị chặn → chỉ cần rê chuột là chạy
    document.addEventListener("mousemove", playMusic, {once:true});
    document.addEventListener("click", playMusic, {once:true});
});
</script>

</body>
</html>
