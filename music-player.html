<!DOCTYPE html>
<html>
<body style="margin:0">

<audio id="audio"></audio>

<script>
const playlist = [
    {name: "Thanh Xuân", src: "music/nhac1.mp3"},
    {name: "Kỷ Niệm", src: "music/nhac2.mp3"},
    {name: "Tạm Biệt", src: "music/nhac3.mp3"}
];

let audio = document.getElementById("audio");

// Lấy dữ liệu đã lưu
let index = parseInt(localStorage.getItem("songIndex")) || 0;
let time = parseFloat(localStorage.getItem("time")) || 0;

// Load bài
function loadSong(i) {
    audio.src = playlist[i].src;
    audio.currentTime = time;
}

// Lưu trạng thái
function save() {
    localStorage.setItem("songIndex", index);
    localStorage.setItem("time", audio.currentTime);
}

// Chuyển bài
function next() {
    index++;
    if (index >= playlist.length) index = 0;
    time = 0;
    loadSong(index);
    audio.play();
}

// Khi hết bài → tự chuyển
audio.addEventListener("ended", next);

// Lưu liên tục
audio.addEventListener("timeupdate", save);

// Load bài đầu
loadSong(index);

// 🔥 AUTO PLAY CHUẨN NHẤT
function playMusic() {
    audio.play().catch(() => {});
}

window.addEventListener("load", () => {
    playMusic();

    document.body.addEventListener("click", playMusic, {once:true});
    document.body.addEventListener("mousemove", playMusic, {once:true});
});
</script>

</body>
</html>
